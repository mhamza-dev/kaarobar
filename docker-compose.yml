services:
  postgres:
    image: postgres:16-alpine
    container_name: kaarobar-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kaarobar_dev
    ports:
      - "5432:5432"
    volumes:
      - kaarobar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kaarobar-redis
    ports:
      - "6379:6379"
    volumes:
      - kaarobar_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  kaarobar_pg_data:
  kaarobar_redis_data:
